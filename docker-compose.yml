services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      QUANT_WEB_API_KEY: ${QUANT_WEB_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./strategies:/app/strategies:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quant_system
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
